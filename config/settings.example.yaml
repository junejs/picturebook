providers:
  text:
    provider: openai-compatible
    model: gpt-4.1-mini
    api_key_env: TEXT_AI_API_KEY
    base_url: null
    timeout_seconds: 300
    max_retries: 2
    # json_mode: true          # set false for LM Studio / servers that don't support response_format
  image:
    active: minimax
    minimax:
      provider: minimax
      model: image-01
      api_key_env: IMAGE_AI_API_KEY
      base_url: https://api.minimaxi.com
      timeout_seconds: 300
      max_retries: 2
    # volcengine:
    #   provider: volcengine
    #   model: doubao-seedream-3.0-t2i
    #   api_key_env: VOLCENGINE_API_KEY
    #   base_url: https://ark.cn-beijing.volces.com

render:
  page_size: 210mmx210mm
  include_cover: false
  text_layout: bottom-band
  body_font: Noto Sans SC
  heading_font: Noto Serif SC
  dpi: 144

runtime:
  workspace_dir: projects
  artifacts_dirname: artifacts
  images_dirname: images
  output_dirname: output
  render_dirname: render
  max_parallel_image_jobs: 2
  # prompts_dir: null            # Jinja2 提示词模板目录，null 则使用包内置 prompts/
  # templates_dir: null          # HTML 模板目录，null 则使用包内置 templates/

features:
  enable_reference_image: false

app:
  log_level: info
  default_style: 水彩画
